[application]
p2p-port = 54482
fallocate = true

# Optional: shell commands to run on download events.
# Metadata is passed via environment variables:
#   NEPTUNE_INFO_HASH  NEPTUNE_NAME  NEPTUNE_SAVE_PATH  NEPTUNE_SIZE
# timeout is optional. If set, the hook command is killed after the given duration.
[application.hook]
# timeout = "30s"
# on-download-started = "echo started $NEPTUNE_NAME"
# on-download-completed = "echo completed $NEPTUNE_NAME"


