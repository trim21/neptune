name: ci

on:
  push:
    paths-ignore:
      - "*.md"
    branches:
      - master
  pull_request:
    paths-ignore:
      - "*.md"
    branches:
      - master

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: sec

      # check go mod clean
      - run: go mod tidy
      - run: git diff --exit-code
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - run: govulncheck -tags release ./...

  test:
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: test

      - name: Install gotestsum
        uses: jaxxstorm/action-install-gh-release@v3.0.0
        with:
          repo: gotestyourself/gotestsum
          tag: v1.13.0

      - run: >-
          gotestsum --format=pkgname --format-hide-empty-pkg
          -- -short -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - run: >-
          gotestsum --format=pkgname --format-hide-empty-pkg
          -- -short -race -tags=release -count=1 -coverprofile=coverage.txt -covermode=atomic ./...
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - run: go build -tags=release -o tmp/try.exe
      - run: ./tmp/try.exe --help

      - run: go build -o tmp/try.exe
      - run: ./tmp/try.exe --help

  test-pass:
    needs:
      - test
      - test-arm64
      - bench-rc4
    runs-on: ubuntu-slim
    steps:
      - run: echo success

  fuzz-download-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: fuzz
      - run: go test -race -fuzz=FuzzDownloadMultiPeer_Async -fuzztime=30s ./internal/download/
      - run: go test -race -fuzz=^FuzzHandleRes$ -fuzztime=30s ./internal/download/
      - run: go test -race -fuzz=^FuzzHandleResDuplicates$ -fuzztime=30s ./internal/download/

  fuzz-download-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: fuzz
      - run: go test -race -fuzz=FuzzPickerDownloadIntegration -fuzztime=30s ./internal/download/
      - run: go test -race -fuzz=FuzzStaleRequest -fuzztime=30s ./internal/download/
      - run: go test -race -fuzz=FuzzFullDownload -fuzztime=30s ./internal/download/

  fuzz-piece-picker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: fuzz
      - run: go test -race -fuzz=. -fuzztime=30s ./internal/piece_picker/

  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - run: python tools/scan-license-header.py

  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: lint

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2

  dprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - run: curl -fsSL https://dprint.dev/install.sh | sh -
      - run: echo "/home/runner/.dprint/bin" >> $GITHUB_PATH
      - run: dprint output-file-paths
      - run: dprint check

  # Test RC4 asm on native arm64. The amd64 cross-compile only verifies
  # syntax; native execution catches logic bugs in the arm64 assembly.
  test-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: test-arm64

      - name: Test RC4 package
        run: go test -count=1 ./internal/pkg/rc4/

      - name: Fuzz RC4 (short)
        run: go test -fuzz=FuzzXORKeyStream -fuzztime=15s ./internal/pkg/rc4/

      - name: Full test suite (no race detector on arm64)
        run: go test -short -count=1 ./...

  # RC4 benchmark on both amd64 and arm64 native hardware.
  bench-rc4:
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: bench-rc4

      - name: Benchmark RC4 (ours)
        run: go test -bench=XORKeyStream -benchtime=1s -count=5 ./internal/pkg/rc4/

      - name: Benchmark RC4 (stdlib)
        run: go test -bench=StdXORKeyStream -benchtime=1s -count=5 ./internal/pkg/rc4/
