name: ci

on:
  push:
    paths-ignore:
      - "*.md"
    branches:
      - master
  pull_request:
    paths-ignore:
      - "*.md"
    branches:
      - master

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: sec

      # check go mod clean
      - run: go mod tidy
      - run: git diff --exit-code
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - run: govulncheck -tags release ./...

  test:
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: test

      - name: Install gotestsum
        uses: jaxxstorm/action-install-gh-release@v3.0.0
        with:
          repo: gotestyourself/gotestsum
          tag: v1.13.0

      - run: >-
          gotestsum --format=pkgname --format-hide-empty-pkg
          -- -short -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - run: >-
          gotestsum --format=pkgname --format-hide-empty-pkg
          -- -short -race -tags=release -count=1 -coverprofile=coverage.txt -covermode=atomic ./...
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - run: go build -tags=release -o tmp/try.exe
      - run: ./tmp/try.exe --help

      - run: go build -o tmp/try.exe
      - run: ./tmp/try.exe --help

  test-pass:
    needs:
      - test
    runs-on: ubuntu-slim
    steps:
      - run: echo success

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: fuzz

      - name: Fuzz download multi-peer async
        run: go test -fuzz=FuzzDownloadMultiPeer_Async -fuzztime=30s ./internal/download/

      - name: Fuzz handleRes
        run: go test -fuzz=FuzzHandleRes -fuzztime=30s ./internal/download/

  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - run: python tools/scan-license-header.py

  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: lint

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2

  dprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - run: curl -fsSL https://dprint.dev/install.sh | sh -
      - run: echo "/home/runner/.dprint/bin" >> $GITHUB_PATH
      - run: dprint output-file-paths
      - run: dprint check

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        suite:
          - neptune_neptune
          - qbittorrent
          - encryption
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: trim21/actions/setup-go@master
        with:
          cache-namespace: e2e

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build neptune
        run: go build -tags release -o e2e/testdata/neptune .

      - name: Generate fixtures
        run: uv run python e2e/gen_fixtures.py

      - name: Copy fixture data for QB seeding
        run: cp -r e2e/testdata/fixtures/test-fixture e2e/testdata/qb-downloads/test-fixture

      - name: Start Docker services
        run: docker compose -f e2e/docker-compose.yml up -d

      - name: Wait for Docker services
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8090 > /dev/null 2>&1; then
              echo "qBittorrent ready"
              break
            fi
            echo "waiting... ($i)"
            sleep 2
          done

      - name: Run ${{ matrix.suite }} tests
        run: uv run pytest e2e/test_${{ matrix.suite }}.py -v --timeout=90 -p no:cacheprovider

      - name: Docker logs (on failure)
        if: failure()
        run: docker compose -f e2e/docker-compose.yml logs

      - name: Stop Docker services
        if: always()
        run: docker compose -f e2e/docker-compose.yml down -v
