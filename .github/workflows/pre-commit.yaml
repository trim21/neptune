name: lint

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  pre-commit:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7.0.1

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.x"

      - uses: trim21/actions/prek@master
