name: publish-sdk-python

on:
  push:
    paths:
      - "sdk/python/**"
      - ".github/workflows/publish-sdk-python.yaml"
    branches:
      - master

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  publish:
    name: Build & publish pre-release to PyPI
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: sdk/python
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"

      - name: Build wheel
        run: uv build

      - name: Publish to PyPI
        run: uv publish
